[basic.config]
cseType = IN
cseID = id-in
cseName = cse-in
serviceProviderID = //acme.example.com
adminID = CAdmin
networkInterface = 0.0.0.0
cseHost = ${hostIPAddress}
databaseType = memory
httpPort = 8080
consoleTheme = dark
consoleType = rich
logLevel = debug

[http]
enableManagementEndpoint=true
enableStructureEndpoint=true
enableUpperTesterEndpoint=true
enableHttps=true
httpsPort=8443
crtFile=C:\Users\aidil\Desktop\Mar26_SmartHome\server-cert.pem
keyFile=C:\Users\aidil\Desktop\Mar26_SmartHome\server-key.pem
verifyClientCert=true

[textui]
startWithTUI = false

[cse.registration]
allowedCSROriginators = /id-in,/id-mn,/id-asn,//sp-1.example.com/sp-1-id-in

[cse]
idLength = 8

[cse.sp.registrar.sp1]
spID = //sp-1.example.com
cseID = /sp-1-id-in
resourceName = sp-1-cse-in
address = http://${basic.config:registrarCseHost}:8180

[http.security]
;;; Enable TLS/HTTPS encryption
useTLS=true
;;; Set your secure port
ports=8443
;;; Absolute paths to your certificate files
caCertificateFile=C:\Users\aidil\Desktop\Mar26_SmartHome\server-cert.pem
caPrivateKeyFile=C:\Users\aidil\Desktop\Mar26_SmartHome\server-key.pem
;;; Require client certificates for mTLS verification
verifyClientCert=true